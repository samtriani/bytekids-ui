<app-shell role="parent" userName="Sam Partida" userAvatar="SP"
  [navItems]="navItems" pageTitle="Progreso"></app-shell>
<div class="page-wrap">
  <div class="ph"><div class="ph-left"><h1>Progreso de aprendizaje</h1><p>Evolución semana a semana de Axel y Antonella</p></div></div>

  <div class="card mb14" style="overflow:hidden">
    <div class="card-h"><span class="card-title">Tendencia de progreso — últimas 6 semanas</span></div>
    <div class="card-p"><div style="height:200px"><canvas #trendC></canvas></div></div>
  </div>

  <!-- Switch hijo -->
  <div class="child-sw mb14">
    <button class="csw-btn" [class.active]="sel==='axel'" (click)="sel='axel'">
      <span class="csw-av">AX</span> Axel <span class="csw-pct">78%</span>
    </button>
    <button class="csw-btn" [class.active]="sel==='ant'" (click)="sel='ant'">
      <span class="csw-av" style="background:var(--info-lt);color:var(--info)">AN</span> Antonella <span class="csw-pct">45%</span>
    </button>
  </div>

  <div class="card card-p">
    <div class="section-hd" style="margin-bottom:14px">Detalle por materia</div>
    <div style="display:flex;flex-direction:column;gap:14px">
      @for (s of subs; track s.name) {
        <div class="subj-row">
          <div class="sr-ico" [style.background]="s.c+'12'">{{ s.icon }}</div>
          <div style="flex:1">
            <div style="display:flex;justify-content:space-between;margin-bottom:4px">
              <span style="font-weight:700;font-size:.88rem">{{ s.name }}</span>
              <span style="font-weight:800;font-size:.88rem" [style.color]="s.c">{{ s.pct }}%</span>
            </div>
            <div class="prog" style="height:8px"><div class="prog-bar" [style.width]="s.pct+'%'" [style.background]="s.c"></div></div>
          </div>
        </div>
      }
    </div>
    <a routerLink="/parent/ai-assistant" class="btn btn-primary btn-block" style="margin-top:16px">🤖 Consultar Asistente IA</a>
  </div>
</div>
